name: doc_manager
description: "Gestionnaire de documents personnels local"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  # DB locale
  sqflite: ^2.4.2
  path: ^1.9.1

  # Chemins système de fichiers
  path_provider: ^2.1.5

  # Import de fichiers
  file_picker: ^10.1.9

  # Partage
  share_plus: ^11.0.0

  # Visionneuse PDF
  flutter_pdfview: ^1.3.2

  # Gestion des permissions
  permission_handler: ^12.0.0+1

  # Icônes Material
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  sqflite_common_ffi: ^2.3.4

flutter:
  uses-material-design: true
