<!DOCTYPE html>
<html lang="fr">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ── Identité ───────────────────────────────────────── -->
  <title>ARCA</title>
  <meta name="description"
        content="Ton classeur numérique personnel. Organise, retrouve et partage tes documents importants — sans cloud, sans compte, sans connexion.">
  <meta name="application-name" content="ARCA">
  <meta name="theme-color" content="#1565C0">

  <!-- ── PWA ────────────────────────────────────────────── -->
  <link rel="manifest" href="manifest.json">

  <!-- ── Favicon (multi-format) ─────────────────────────── -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/Icon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/Icon-16.png">
  <link rel="shortcut icon" href="favicon.png">

  <!-- ── Apple / iOS ────────────────────────────────────── -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ARCA">
  <link rel="apple-touch-icon" href="icons/Icon-180.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/Icon-152.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/Icon-180.png">

  <!-- ── Open Graph (partage sur réseaux) ───────────────── -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="ARCA — Gestionnaire de documents">
  <meta property="og:description"
        content="Ton classeur numérique personnel. Sans cloud, sans compte, sans connexion.">
  <meta property="og:image" content="icons/Icon-512.png">

  <!-- ── Twitter Card ───────────────────────────────────── -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="ARCA">
  <meta name="twitter:description"
        content="Ton classeur numérique personnel. Sans cloud, sans compte, sans connexion.">
  <meta name="twitter:image" content="icons/Icon-512.png">

  <!-- ── Splash screen couleur pendant le chargement Flutter -->
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #1565C0;
    }
  </style>

</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
